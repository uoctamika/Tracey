name: Testing and Quality

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: codeberg-small

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cflags: ""

          - compiler: clang
            cc: clang
            cflags: ""

          - compiler: gcc
            cc: gcc
            cflags: "-m32"

          - compiler: clang
            cc: clang
            cflags: "-m32"

          - compiler: gcc
            cc: aarch64-linux-gnu-gcc
            cflags: ""

          - compiler: gcc
            cc: arm-linux-gnueabihf-gcc
            cflags: ""

    container:
      image: codeberg.org/uoctamika/tracey-ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          echo "Compiler: ${{ matrix.compiler }}"
          echo "CC: ${{ matrix.cc }}"
          echo "CFLAGS: ${{ matrix.cflags }}"
          ${{ matrix.cc }} --version || true

      - name: Compile (${{ matrix.compiler }} / ${{ matrix.cflags }})
        working-directory: bootstrap
        run: |
          make clean
          make CC=${{ matrix.cc }} CFLAGS="${{ matrix.cflags }} -Wall -Wextra -std=c11 -Iinclude -g -O0"

