name: Testing and Quality

on:
  pull_request:

jobs:
  test:
    runs-on: codeberg-small-lazy

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: gcc-x86_64
            image: codeberg.org/uoctamika/tracey:gcc
            cc: gcc
            arch: x86_64

          - name: clang-x86_64
            image: codeberg.org/uoctamika/tracey:clang
            cc: clang
            arch: x86_64

          - name: gcc-i686
            image: codeberg.org/uoctamika/tracey:gcc
            cc: gcc
            arch: i686

          - name: clang-i686
            image: codeberg.org/uoctamika/tracey:clang
            cc: clang
            arch: i686

          - name: gcc-aarch64
            image: codeberg.org/uoctamika/tracey:gcc
            cc: aarch64-linux-gnu-gcc
            arch: aarch64

          - name: gcc-armhf
            image: codeberg.org/uoctamika/tracey:gcc
            cc: arm-linux-gnueabihf-gcc
            arch: armhf

    name: ${{ matrix.name }}

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Toolchain information
        run: |
          echo "Image    : ${{ matrix.image }}"
          echo "Compiler : ${{ matrix.cc }}"
          echo "Arch     : ${{ matrix.arch }}"

          ${{ matrix.cc }} --version

      - name: Build
        working-directory: bootstrap
        run: |
          make clean

          make \
            CC=${{ matrix.cc }} \
            ARCH=${{ matrix.arch }}

      - name: Verify binary
        working-directory: bootstrap
        run: |
          file bin/traceyc

      - name: Run test
        if: matrix.arch == 'x86_64' || matrix.arch == 'i686'
        working-directory: bootstrap
        run: |
          ./bin/traceyc index.trc -o app -Wall
