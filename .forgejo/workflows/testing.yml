name: Testing and Quality

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: codeberg-small-lazy

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang

    container:
      image: archlinux:latest

    steps:
      - name: Install base tools
        run: |
          pacman -Syu --noconfirm \
            git \
            nodejs \
            npm \
            gcc \
            clang \
            make \
            cmake

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile (${{ matrix.compiler }})
        working-directory: bootstrap
        run: |
          make -f GNUmake clean
          make -f GNUmake CC=${{ matrix.compiler }} -j2

      - name: Test (${{ matrix.compiler }})
        working-directory: bootstrap
        run: |
          ./bin/traceyc index.trc -o app -Wall
